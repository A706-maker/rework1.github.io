<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Hero Section</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.5)), url('background.jpg');
            background-size: cover;
            animation: backgroundAnimation 10s infinite alternate;
        }
        @keyframes backgroundAnimation {
            0% { background-position: left; }
            100% { background-position: right; }
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 20px;
            transition: transform 0.3s;
        }
        .glass-card:hover {
            transform: scale(1.05);
        }
        .stat-card {
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .contact-form {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="glass-card">
            <h1>Welcome to Our Housing Crisis Awareness!</h1>
            <p>Join us in addressing the housing challenges.</p>
        </div>
        <div class="stat-card" style="animation-delay: 0.2s;">Stat 1: 1000 Homes Lost.</div>
        <div class="stat-card" style="animation-delay: 0.4s;">Stat 2: 5000 People Displaced.</div>
        <div class="stat-card" style="animation-delay: 0.6s;">Stat 3: 3000 Families Affected.</div>
        <form class="contact-form" method="POST" action="https://script.google.com/macros/s/YOUR_GOOGLE_SCRIPT_URL/exec">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
